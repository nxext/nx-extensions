name: CI
env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      force_publish:
        description: Force `nx release publish` for the versions already committed in package.json, bypassing conventional-commits change detection (use after manually correcting versions)
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  main:
    name: Nx Cloud - Main Job
    uses: nrwl/ci/.github/workflows/nx-cloud-main.yml@v0.15
    with:
      main-branch-name: main
      number-of-agents: 3
      init-commands: |
        pnpm exec nx-cloud start-ci-run --stop-agents-after="e2e" --agent-count=3
      parallel-commands: |
        pnpm exec nx-cloud record -- pnpm exec nx format:check
      parallel-commands-on-agents: |
        pnpm exec nx affected --target build lint test e2e

  agents:
    name: Nx Cloud - Agents
    uses: nrwl/ci/.github/workflows/nx-cloud-agents.yml@v0.15
    with:
      number-of-agents: 3

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    if: github.ref == 'refs/heads/main'

    needs:
      - main
      - agents

    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
        with:
          git_bot_token: ${{ secrets.GIT_BOT_TOKEN }}
      - name: Release
        uses: ./.github/actions/release
        with:
          git_bot_token: ${{ secrets.GIT_BOT_TOKEN }}
          npm_token: ${{ secrets.NPM_TOKEN }}
          force_publish: ${{ inputs.force_publish }}
