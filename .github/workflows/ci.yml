name: CI
env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      force_publish:
        description: Force `nx release publish` for the versions already committed in package.json, bypassing conventional-commits change detection (use after manually correcting versions)
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  main:
    name: Nx Cloud - Main Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Start Nx Cloud CI run and distribute tasks to Nx Agents
        run: pnpm exec nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e"

      - name: Check formatting
        run: pnpm exec nx-cloud record -- pnpm exec nx format:check

      - name: Run build, lint, test and e2e for affected projects
        run: pnpm exec nx affected --target build lint test e2e

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    if: github.ref == 'refs/heads/main'

    needs:
      - main

    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
        with:
          git_bot_token: ${{ secrets.GIT_BOT_TOKEN }}
      - name: Release
        uses: ./.github/actions/release
        with:
          git_bot_token: ${{ secrets.GIT_BOT_TOKEN }}
          npm_token: ${{ secrets.NPM_TOKEN }}
          force_publish: ${{ inputs.force_publish }}
